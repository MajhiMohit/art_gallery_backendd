spring.application.name=artt_gallery

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/artt_gallery}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:2400031797}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server Port ───────────────────────────────────────────────
server.port=${PORT:8080}

# ── Frontend URL (used in email verification links) ──────────
FRONTEND_URL=${FRONTEND_URL:https://art-gallery-new-seven.vercel.app}

# ── Multipart ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true

# ── Email: Brevo Transactional API (HTTPS port 443 — works on Railway) ───
# Override BREVO_API_KEY / BREVO_SENDER_EMAIL in Railway dashboard → Variables
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL:mail-majjimohit77@gmail.com}
brevo.sender.name=${BREVO_SENDER_NAME:ArtGallery}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
