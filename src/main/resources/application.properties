spring.application.name=artt_gallery

# ── Database (Railway MySQL or local fallback) ───────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/artt_gallery}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:2400031797}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server Port (Railway injects PORT automatically) ─────────
server.port=${PORT:8080}

# ── Multipart ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true

# ── Email via Resend HTTP API (no SMTP — works on Railway) ───
# RESEND_API_KEY and RESEND_FROM_EMAIL are set as Railway env vars
# Defaults are used for local development
RESEND_API_KEY=${RESEND_API_KEY:re_GqNCHM74_4nSydBcDALSTrbgqEgGNohH8}
RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:ArtGallery <onboarding@resend.dev>}

# Disable Spring Mail auto-configuration (we use Resend HTTP directly)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
