spring.application.name=artt_gallery

# ── Database (Railway MySQL or local fallback) ───────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/artt_gallery}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:2400031797}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server Port (Railway injects PORT automatically) ─────────
